kind = "web"
previewPath = "/"
title = "VibeStream - Shared Playlist"
version = "1.0.0"
id = "artifacts/vibestream"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23162

[services.development]
run = "pnpm --filter @workspace/vibestream run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vibestream", "run", "build" ]
publicDir = "artifacts/vibestream/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23162"
BASE_PATH = "/"
